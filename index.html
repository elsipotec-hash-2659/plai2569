<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ส่วนของการตกแต่งความสวยงาม (CSS) --- */
        body {
            background-color: #0b0e14; /* สีพื้นหลังโทนเข้ม */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .control-panel {
            background-color: #151a23;
            border-radius: 15px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #232a35;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            color: #00f2fe; /* สีฟ้านีออน */
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); /* เอฟเฟกต์เรืองแสง */
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 12px;
            margin: 0;
            letter-spacing: 1px;
        }

        .channel-card {
            background-color: #1e242f;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            color: #c9d1d9;
        }

        .channel-info i {
            color: #8b949e; /* สีไอคอน */
            width: 20px;
            text-align: center;
        }

        /* ตกแต่งปุ่มสลับ (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #30363d;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00f2fe; /* สีปุ่มตอนเปิด */
        }

        input:checked + .slider:before {
            transform: translateX(24px); /* เลื่อนปุ่มไปทางขวา */
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #58a6ff;
            line-height: 1.6;
        }
        
        .footer span {
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="header">
            <h1 class="title">SMART HOME</h1>
            <p class="subtitle">ESP8266 IoT Control Panel</p>
        </div>

        <div class="channel-card">
            <div class="channel-info">
                <i class="fa-solid fa-lightbulb"></i>
                ช่องที่ 1 (D1)
            </div>
            <label class="switch">
                <input type="checkbox" id="D1" onchange="updateFirebase('D1')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-card">
            <div class="channel-info">
                <i class="fa-solid fa-plug"></i>
                ช่องที่ 2 (D2)
            </div>
            <label class="switch">
                <input type="checkbox" id="D2" onchange="updateFirebase('D2')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-card">
            <div class="channel-info">
                <i class="fa-solid fa-tv"></i>
                ช่องที่ 3 (D5)
            </div>
            <label class="switch">
                <input type="checkbox" id="D5" onchange="updateFirebase('D5')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-card">
            <div class="channel-info">
                <i class="fa-solid fa-fan"></i>
                ช่องที่ 4 (D6)
            </div>
            <label class="switch">
                <input type="checkbox" id="D6" onchange="updateFirebase('D6')">
                <span class="slider"></span>
            </label>
        </div>

        <div class="footer">
            ผู้พัฒนาระบบ<br>
            <span>ครูวิทยากร วรรณา<br>
            แผนกอิเล็กทรอนิกส์<br>
            วิทยาลัยสารพัดช่างศรีสะเกษ</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. ตั้งค่า Firebase ของคุณที่นี่ (นำข้อมูลมาจาก Project Settings ของ Firebase)
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของคุณที่นี่",
            authDomain: "ใส่_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://ใส่_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "ใส่_PROJECT_ID_ของคุณที่นี่",
            storageBucket: "ใส่_PROJECT_ID.appspot.com",
            messagingSenderId: "ใส่_SENDER_ID",
            appId: "ใส่_APP_ID"
        };

        // 2. เริ่มต้นการเชื่อมต่อ Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. กำหนดตัวแปรสำหรับช่องต่างๆ
        const channels = ['D1', 'D2', 'D5', 'D6'];

        // 4. ฟังก์ชันสำหรับอัปเดตข้อมูลขึ้น Firebase เมื่อมีการกดสวิตช์บนเว็บ
        function updateFirebase(channel) {
            // เช็คว่าสวิตช์นั้นถูกเปิดอยู่ (true) หรือปิดอยู่ (false)
            const isChecked = document.getElementById(channel).checked;
            
            // แปลงสถานะเป็นเลข 1 (เปิด) และ 0 (ปิด) เพื่อให้ NodeMCU อ่านค่าง่ายๆ
            const valueToSend = isChecked ? 1 : 0; 

            // สั่งอัปเดตค่าไปที่ Database Path: SmartHome/ช่องนั้นๆ
            database.ref('SmartHome/' + channel).set(valueToSend)
                .then(() => {
                    console.log(channel + ' อัปเดตเป็น ' + valueToSend + ' สำเร็จ');
                })
                .catch((error) => {
                    console.error('เกิดข้อผิดพลาดในการอัปเดต:', error);
                });
        }

        // 5. ฟังก์ชันคอยรับฟังการเปลี่ยนแปลงจาก Firebase (Realtime Sync)
        // เพื่อให้ถ้าสวิตช์ถูกสั่งเปิดจาก NodeMCU หรือแอปอื่น หน้าเว็บจะเปลี่ยนตามทันที
        channels.forEach(channel => {
            database.ref('SmartHome/' + channel).on('value', (snapshot) => {
                const val = snapshot.val();
                
                // หากพบค่าในฐานข้อมูล
                if (val !== null) {
                    // ถ้าค่าเป็น 1 ให้ปรับสวิตช์หน้าเว็บเป็นเปิด (checked = true)
                    document.getElementById(channel).checked = (val === 1);
                }
            });
        });
    </script>
</body>
</html>
